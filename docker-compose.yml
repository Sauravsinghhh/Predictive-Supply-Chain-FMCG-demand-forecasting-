version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freshmind_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow_server:5000
    depends_on:
      - mlflow_server
    restart: always

  mlflow_server:
    image: python:3.12-slim
    container_name: freshmind_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow
    entrypoint: >
      sh -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri local --default-artifact-root /mlflow"
    restart: always
