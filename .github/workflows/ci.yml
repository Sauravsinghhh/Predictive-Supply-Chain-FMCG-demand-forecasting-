name: FreshMind Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If pytest is not in requirements.txt, make sure it is installed
        pip install pytest pytest-cov

    - name: Generate synthetic dataset for testing
      run: |
        python scripts/download_data.py --sample

    - name: Run pytest test suite
      run: |
        python -m pytest --cov=src tests/ --cov-report=xml

    - name: Verify project structure and build sanity
      run: |
        python src/data/data_loader.py
